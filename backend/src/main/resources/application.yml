spring:
  application:
    name: talent-platform
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/talent_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:talent}
    password: ${DB_PASSWORD:talent_dev}
  servlet:
    multipart:
      max-file-size: ${FILE_MAX_SIZE:50MB}
      max-request-size: ${FILE_MAX_REQUEST_SIZE:250MB}
  jackson:
    time-zone: Asia/Shanghai
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
server:
  port: ${SERVER_PORT:8080}
app:
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-at-least-32-bytes}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  bootstrap:
    username: ${SUPER_ADMIN_USERNAME:superadmin}
    password: ${SUPER_ADMIN_PASSWORD:ChangeMe123!}
  storage:
    type: ${STORAGE_TYPE:local}
    local-root: ${LOCAL_STORAGE_ROOT:../data/uploads}
    oss-endpoint: ${OSS_ENDPOINT:}
    oss-bucket: ${OSS_BUCKET:}
    oss-access-key: ${OSS_ACCESS_KEY:}
    oss-secret-key: ${OSS_SECRET_KEY:}
  cors-origins: ${CORS_ORIGINS:http://localhost:5173}

