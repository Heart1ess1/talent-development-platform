services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: talent_platform
      MYSQL_USER: talent
      MYSQL_PASSWORD: talent_dev
      MYSQL_ROOT_PASSWORD: root_dev
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_dev"]
      interval: 5s
      timeout: 5s
      retries: 20
volumes:
  mysql-data:

